default_config:
logger:
  default: info
  logs:
    custom_components.heatit_wifi6: debug
homeassistant:
  auth_providers:
    - type: trusted_networks
      trusted_networks:
        - 127.0.0.1
        - ::1
        - 172.0.0.0/8
        - 192.168.0.0/16
        - 10.0.0.0/8
      allow_bypass_login: true
